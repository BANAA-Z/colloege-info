<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大学生信息差情报导航 | 考研·考公·校招</title>
    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark.css">
    <style>
        .visit-info{margin:10px 0;color:#666;}
        .message-list { margin-top: 20px; }
        .message-item {
            background: #f9fafb;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #eee;
        }
        .message-item strong {
            font-size: 14px;
            color: #111827;
        }
        .message-item p {
            margin: 6px 0 0;
            font-size: 14px;
            color: #374151;
            line-height: 1.5;
        }
        .message-input{margin:15px 0;display:flex;gap:10px;flex-direction:column;}
        .message-input input,.message-input textarea{padding:10px;border:1px solid #ddd;border-radius:6px;}
        .message-input button{width:120px;padding:8px;background:#3b82f6;color:#fff;border:none;border-radius:6px;cursor:pointer;}
    </style>
</head>
<body>
    <div class="container">
        <h1>大学生信息差情报导航</h1>
        <div class="visit-info">
            本站总访问量：<span id="visit-count">0</span>
            &nbsp;&nbsp;|&nbsp;&nbsp;
            独立访客数：<span id="visitor-count">0</span>
        </div>

        <button id="darkModeToggle" style="position: fixed; top: 20px; right: 20px; z-index: 999;">🌙 暗黑模式</button>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索考研/考公/校招/工具...">
            <div id="searchResult"></div>
        </div>

        <div id="kaoyan-section" class="nav-section"></div>
        <div id="kaogong-section" class="nav-section"></div>
        <div id="xiaozhao-section" class="nav-section"></div>
        <div id="tools-section" class="nav-section"></div>
        <section id="bilibili-section" class="nav-section"></section>

        <section class="message-section">
            <h2>💬 留言板</h2>
            <div class="message-input">
                <input type="text" id="nameInput" placeholder="你的昵称" maxlength="20">
                <textarea id="contentInput" placeholder="写下你的留言、建议或问题吧~" maxlength="500"></textarea>
                <button id="submitBtn">发布留言</button>
            </div>
            <div id="messageList" class="message-list"></div>
        </section>
    </div>

    <footer style="margin-top: 60px; padding: 20px; text-align: center; color: #6b7280; font-size: 14px; border-top: 1px solid rgba(0,0,0,0.05);">
        <p>抖音号：<a href="https://v.douyin.com/你的抖音链接/" target="_blank" style="color: #3b82f6; text-decoration: none;">@你的抖音号</a></p>
        <p style="margin-top: 8px;">本站内容仅供学习交流使用，侵删</p>
    </footer>

    <!-- 腾讯云SDK 优先加载 -->
    <script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>

    <!-- 你原有全部功能JS 保持不变 -->
    <script type="module" src="assets/js/config.js"></script>
    <script type="module" src="assets/js/fold.js"></script>
    <script type="module" src="assets/js/search.js"></script>
    <script type="module" src="assets/js/md-loader.js"></script>
    <script type="module" src="assets/js/dark-mode.js"></script>
    <script type="module" src="assets/js/logistics.js"></script>
    <!-- 先初始化 Firebase，再加载统计逻辑 -->
    <script type="module" src="assets/js/firebase-init.js"></script>
    <script type="module" src="assets/js/firebase-stats.js"></script>

    <!-- 引入独立云服务JS + 执行 -->
    <script type="module">
        import {
            initCloudbase,
            updateViewStat,
            loadMessage,
            postMessage
        } from "./assets/js/cloudbase-service.js";

        window.addEventListener("load", async () => {
            await initCloudbase();
            await updateViewStat();
            await loadMessage();
        });

        document.getElementById("submitBtn").addEventListener("click", async () => {
            const name = document.getElementById("nameInput").value.trim() || "匿名";
            const content = document.getElementById("contentInput").value.trim();
            if (!content) return alert("请输入留言内容");

            await postMessage(name, content);
            alert("留言提交成功，等待审核！");
            document.getElementById("nameInput").value = "";
            document.getElementById("contentInput").value = "";
            loadMessage();
        });
    </script>
</body>
</html>
