<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员后台 - 大学生信息差情报导航</title>
    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark.css">
    <style>
        .login-box { max-width: 400px; margin: 100px auto; padding: 30px; background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        .login-box h2 { text-align: center; margin-bottom: 20px; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; }
        .login-box button { width: 100%; padding: 12px; background: #3b82f6; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
        .admin-panel { display: none; max-width: 1200px; margin: 20px auto; padding: 20px; }
        .message-item { background: #f8fafc; padding: 15px; margin: 10px 0; border-radius: 8px; position: relative; }
        .btn-group { position: absolute; top: 10px; right: 10px; display: flex; gap: 8px; }
        .del-btn { background: #ef4444; color: #fff; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .pass-btn { background: #22c25e; color: #fff; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .stats-card { background: #fff; padding: 20px; border-radius: 8px; margin: 10px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="login-box" id="loginBox">
        <h2>管理员登录</h2>
        <input type="password" id="adminPwd" placeholder="请输入管理员密码">
        <button id="loginBtn">登录</button>
    </div>

    <div class="admin-panel" id="adminPanel">
        <h1>📊 管理员后台</h1>
        <div class="stats-card">
            <h3>网站访问统计（腾讯云）</h3>
            <div id="statsContent">加载中...</div>
        </div>
        <div class="stats-card">
            <h3>留言管理</h3>
            <div id="messageList">加载中...</div>
        </div>
    </div>

    <!-- 腾讯云 SDK -->
    <script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/blueimp-md5@2.19.0/js/md5.min.js"></script>

    <script>
        // 配置
        const ENV_ID = "college-info-d8gllm2mv8ef87c41";
        const REGION = "ap-shanghai";
        const ADMIN_PASSWORD_MD5 = "9b5e3a48e3db7e5eadef326baef4317a";

        let tcDB;
        let app;

        // 初始化腾讯云
        async function initTC() {
            app = cloudbase.init({ env: ENV_ID, region: REGION });
            await app.auth().signInAnonymously();
            tcDB = app.database();
        }

        // 登录逻辑
        document.getElementById("loginBtn").onclick = async () => {
            const pwd = document.getElementById("adminPwd").value.trim();
            if (!pwd) return alert("请输入密码");

            if (md5(pwd) === ADMIN_PASSWORD_MD5) {
                await initTC();
                document.getElementById("loginBox").style.display = "none";
                document.getElementById("adminPanel").style.display = "block";
                await loadAllData();
            } else {
                alert("密码错误！");
            }
        };

        // 加载所有数据
        async function loadAllData() {
            // 1. 加载留言
            try {
                const msgRes = await tcDB.collection("messages").orderBy("createTime", "desc").get();
                const messages = msgRes.data || [];
                const list = document.getElementById("messageList");
                list.innerHTML = "";

                messages.forEach(msg => {
                    let formatTime = "未知时间";
                    if (msg.createTime) {
                        const d = new Date(msg.createTime);
                        const y = d.getFullYear();
                        const m = String(d.getMonth() + 1).padStart(2, "0");
                        const day = String(d.getDate()).padStart(2, "0");
                        const h = String(d.getHours()).padStart(2, "0");
                        const min = String(d.getMinutes()).padStart(2, "0");
                        formatTime = `${y}-${m}-${day} ${h}:${min}`;
                    }

                    list.innerHTML += `
                    <div class="message-item">
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <strong>${msg.name || "匿名"}</strong>
                            <small style="color:#999;">${formatTime}</small>
                        </div>
                        <p style="margin:8px 0;">${msg.content || ""}</p>
                        <small>状态：${msg.status === "approved" ? "✅ 已通过" : "⏳ 待审核"}</small>
                        <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:10px;">
                            <button class="pass-btn" onclick="passMsg('${msg._id}')" ${msg.status === "approved" ? "disabled" : ""}>通过</button>
                            <button class="del-btn" onclick="delMsg('${msg._id}')">删除</button>
                        </div>
                    </div>`;
                });
            } catch (err) {
                console.error("加载留言失败:", err);
                document.getElementById("messageList").innerHTML = "加载失败";
            }

            // 2. 加载统计（和主站一致）
            try {
                const statsRes = await tcDB.collection("stats").doc("site").get();
                let rawData = statsRes.data;
                let data = Array.isArray(rawData) ? rawData[0] : rawData;

                const total = data?.totalViews ?? 0;
                const visitors = (data?.uniqueVisitors ?? []).length;

                document.getElementById("statsContent").innerHTML =
                `总访问：${total}　独立访客：${visitors}`;
            } catch (err) {
                console.error("加载统计失败:", err);
                document.getElementById("statsContent").innerHTML = "加载失败";
            }
        }

        // 审核
        async function passMsg(id) {
            await tcDB.collection("messages").doc(id).update({ status: "approved" });
            alert("✅ 已通过");
            await loadAllData();
        }

        // 删除
        async function delMsg(id) {
            if (!confirm("确定删除？")) return;
            await tcDB.collection("messages").doc(id).remove();
            alert("✅ 已删除");
            await loadAllData();
        }
    </script>
</body>
</html>
